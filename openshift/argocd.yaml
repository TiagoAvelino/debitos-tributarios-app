apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshift-gitops-debitos-tributarios-edit
  namespace: debitos-tributarios
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: debitos-tributarios
  namespace: openshift-gitops
spec:
  description: GitOps project for the debitos-tributarios frontend.
  sourceRepos:
    - https://github.com/TiagoAvelino/debitos-tributarios-app.git
  destinations:
    - namespace: debitos-tributarios
      server: https://kubernetes.default.svc
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: debitos-tributarios
  namespace: openshift-gitops
spec:
  project: debitos-tributarios
  source:
    repoURL: https://github.com/TiagoAvelino/debitos-tributarios-app.git
    targetRevision: main
    path: helm/debitos-tributarios
    helm:
      releaseName: debitos-tributarios
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: debitos-tributarios
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
