apiVersion: v1
kind: Namespace
metadata:
  name: debitos-tributarios
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline
  namespace: debitos-tributarios
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-edit
  namespace: debitos-tributarios
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: debitos-tributarios
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pipeline-image-builder
  namespace: debitos-tributarios
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: debitos-tributarios
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-builder
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: debitos-tributarios
  namespace: debitos-tributarios
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: npm-ci
  namespace: debitos-tributarios
spec:
  params:
    - name: app-subdir
      type: string
  workspaces:
    - name: source
  steps:
    - name: install
      image: node:20-alpine
      workingDir: $(workspaces.source.path)/$(params.app-subdir)/frontend
      script: |
        #!/bin/sh
        set -eu
        npm ci
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: npm-audit
  namespace: debitos-tributarios
spec:
  params:
    - name: app-subdir
      type: string
    - name: audit-level
      type: string
      default: high
  workspaces:
    - name: source
  steps:
    - name: audit
      image: node:20-alpine
      workingDir: $(workspaces.source.path)/$(params.app-subdir)/frontend
      script: |
        #!/bin/sh
        set -eu
        npm audit --audit-level="$(params.audit-level)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: frontend-build
  namespace: debitos-tributarios
spec:
  params:
    - name: app-subdir
      type: string
  workspaces:
    - name: source
  steps:
    - name: build
      image: node:20-alpine
      workingDir: $(workspaces.source.path)/$(params.app-subdir)/frontend
      script: |
        #!/bin/sh
        set -eu
        npm run build
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: dockerfile-lint
  namespace: debitos-tributarios
spec:
  params:
    - name: app-subdir
      type: string
  workspaces:
    - name: source
  steps:
    - name: hadolint
      image: docker.io/hadolint/hadolint:v2.12.0-alpine
      workingDir: $(workspaces.source.path)/$(params.app-subdir)
      script: |
        #!/bin/sh
        set -eu
        hadolint Dockerfile
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: sonarqube-scan
  namespace: debitos-tributarios
spec:
  params:
    - name: app-subdir
      type: string
    - name: sonar-host-url
      type: string
    - name: sonar-project-key
      type: string
    - name: sonar-token-secret-name
      type: string
      default: sonarqube-token
    - name: sonar-token-secret-key
      type: string
      default: token
  workspaces:
    - name: source
  steps:
    - name: scan
      image: docker.io/sonarsource/sonar-scanner-cli:5.0
      workingDir: $(workspaces.source.path)/$(params.app-subdir)
      env:
        - name: SONAR_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.sonar-token-secret-name)
              key: $(params.sonar-token-secret-key)
      script: |
        #!/bin/sh
        set -eu
        if [ -z "${SONAR_TOKEN:-}" ]; then
          echo "SonarQube token secret is required when enable-sonarqube=true" >&2
          exit 1
        fi
        sonar-scanner \
          -Dsonar.host.url="$(params.sonar-host-url)" \
          -Dsonar.token="${SONAR_TOKEN}" \
          -Dsonar.projectKey="$(params.sonar-project-key)" \
          -Dsonar.projectName="$(params.sonar-project-key)" \
          -Dsonar.sources=frontend/src \
          -Dsonar.exclusions=frontend/node_modules/**,frontend/dist/**
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: update-helm-image
  namespace: debitos-tributarios
spec:
  params:
    - name: git-url
      type: string
    - name: git-revision
      type: string
    - name: app-subdir
      type: string
    - name: values-file
      type: string
    - name: image-repository
      type: string
    - name: image-tag
      type: string
    - name: git-user-name
      type: string
      default: openshift-pipeline
    - name: git-user-email
      type: string
      default: openshift-pipeline@example.com
    - name: git-credentials-secret-name
      type: string
      default: github-credentials
    - name: git-username-secret-key
      type: string
      default: username
    - name: git-token-secret-key
      type: string
      default: token
  results:
    - name: commit
      description: Git commit SHA pushed for the Helm image update.
  workspaces:
    - name: source
  steps:
    - name: commit-image
      image: docker.io/alpine/git:2.45.2
      workingDir: $(workspaces.source.path)
      env:
        - name: GIT_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.git-credentials-secret-name)
              key: $(params.git-username-secret-key)
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.git-credentials-secret-name)
              key: $(params.git-token-secret-key)
      script: |
        #!/bin/sh
        set -eu

        values_path="$(params.app-subdir)/$(params.values-file)"
        image_repository="$(params.image-repository)"
        image_tag="$(params.image-tag)"

        if [ ! -f "${values_path}" ]; then
          echo "Helm values file not found: ${values_path}" >&2
          exit 1
        fi

        tmp_file="$(mktemp)"
        awk -v repo="${image_repository}" -v tag="${image_tag}" '
          /^image:/ { in_image=1; print; next }
          in_image && /^[^[:space:]]/ { in_image=0 }
          in_image && /^[[:space:]]*repository:/ {
            sub(/repository:.*/, "repository: " repo)
            print
            next
          }
          in_image && /^[[:space:]]*tag:/ {
            sub(/tag:.*/, "tag: \"" tag "\"")
            print
            next
          }
          { print }
        ' "${values_path}" > "${tmp_file}"
        mv "${tmp_file}" "${values_path}"

        git config --global --add safe.directory "$(workspaces.source.path)"
        git config user.name "$(params.git-user-name)"
        git config user.email "$(params.git-user-email)"

        if git diff --quiet -- "${values_path}"; then
          echo "Helm image already points to ${image_repository}:${image_tag}; nothing to commit."
          git rev-parse HEAD | tr -d '\n' > "$(results.commit.path)"
          exit 0
        fi

        git add "${values_path}"
        git commit -m "chore(gitops): update frontend image to ${image_tag}"
        git rev-parse HEAD | tr -d '\n' > "$(results.commit.path)"

        case "$(params.git-url)" in
          https://*)
            authenticated_url="https://${GIT_USERNAME}:${GIT_TOKEN}@$(printf '%s' "$(params.git-url)" | sed 's#^https://##')"
            ;;
          *)
            echo "Only HTTPS Git remotes are supported by this task." >&2
            exit 1
            ;;
        esac

        git remote set-url origin "${authenticated_url}"
        git push origin "HEAD:$(params.git-revision)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: argocd-sync
  namespace: debitos-tributarios
spec:
  params:
    - name: argocd-server
      type: string
    - name: argocd-application
      type: string
    - name: argocd-revision
      type: string
    - name: argocd-insecure
      type: string
      default: "true"
    - name: argocd-grpc-web
      type: string
      default: "true"
    - name: argocd-sync-timeout
      type: string
      default: "300"
    - name: argocd-token-secret-name
      type: string
      default: argocd-token
    - name: argocd-token-secret-key
      type: string
      default: token
  steps:
    - name: sync
      image: quay.io/argoproj/argocd:v2.11.7
      env:
        - name: ARGOCD_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.argocd-token-secret-name)
              key: $(params.argocd-token-secret-key)
      script: |
        #!/bin/sh
        set -eu

        optional_flags=""
        if [ "$(params.argocd-insecure)" = "true" ]; then
          optional_flags="${optional_flags} --insecure"
        fi
        if [ "$(params.argocd-grpc-web)" = "true" ]; then
          optional_flags="${optional_flags} --grpc-web"
        fi

        argocd app get "$(params.argocd-application)" \
          --server "$(params.argocd-server)" \
          --auth-token "${ARGOCD_AUTH_TOKEN}" \
          ${optional_flags} \
          --refresh

        argocd app sync "$(params.argocd-application)" \
          --server "$(params.argocd-server)" \
          --auth-token "${ARGOCD_AUTH_TOKEN}" \
          ${optional_flags} \
          --revision "$(params.argocd-revision)"

        argocd app wait "$(params.argocd-application)" \
          --server "$(params.argocd-server)" \
          --auth-token "${ARGOCD_AUTH_TOKEN}" \
          ${optional_flags} \
          --sync \
          --health \
          --timeout "$(params.argocd-sync-timeout)"
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: debitos-tributarios-gitops
  namespace: debitos-tributarios
spec:
  params:
    - name: git-url
      type: string
      default: https://github.com/TiagoAvelino/debitos-tributarios-app.git
      description: Git repository URL containing this project.
    - name: git-revision
      type: string
      default: main
      description: Branch to build and update with the new Helm image tag.
    - name: app-subdir
      type: string
      default: debitos-tributarios
      description: Path from the repository root to this app.
    - name: helm-values-file
      type: string
      default: helm/debitos-tributarios/values.yaml
      description: Path from the app subdirectory to the Helm values file Argo CD watches.
    - name: image-namespace
      type: string
      default: debitos-tributarios
      description: Namespace whose internal registry image stream receives the built image.
    - name: image-name
      type: string
      default: debitos-tributarios
      description: Internal registry image stream name.
    - name: audit-level
      type: string
      default: high
      description: npm audit threshold.
    - name: enable-sonarqube
      type: string
      default: "false"
      description: Set to true to run the SonarQube quality scan.
    - name: sonar-host-url
      type: string
      default: ""
      description: SonarQube server URL.
    - name: sonar-project-key
      type: string
      default: debitos-tributarios
      description: SonarQube project key.
    - name: sonar-token-secret-name
      type: string
      default: sonarqube-token
      description: Secret containing the SonarQube token.
    - name: sonar-token-secret-key
      type: string
      default: token
      description: Key inside the SonarQube token secret.
    - name: git-credentials-secret-name
      type: string
      default: github-credentials
      description: Secret with GitHub username and token used to push the Helm image update.
    - name: git-username-secret-key
      type: string
      default: username
      description: Key in the GitHub credentials secret containing the username.
    - name: git-token-secret-key
      type: string
      default: token
      description: Key in the GitHub credentials secret containing the token.
    - name: git-user-name
      type: string
      default: openshift-pipeline
      description: Git author name for the image update commit.
    - name: git-user-email
      type: string
      default: openshift-pipeline@example.com
      description: Git author email for the image update commit.
    - name: argocd-server
      type: string
      default: openshift-gitops-server.openshift-gitops.svc.cluster.local:443
      description: Argo CD API server used to sync the application.
    - name: argocd-application
      type: string
      default: debitos-tributarios
      description: Argo CD Application name to refresh, sync, and wait.
    - name: argocd-insecure
      type: string
      default: "true"
      description: Pass --insecure to the Argo CD CLI.
    - name: argocd-grpc-web
      type: string
      default: "true"
      description: Pass --grpc-web to the Argo CD CLI.
    - name: argocd-sync-timeout
      type: string
      default: "300"
      description: Seconds to wait for Argo CD sync and health.
    - name: argocd-token-secret-name
      type: string
      default: argocd-token
      description: Secret containing an Argo CD auth token.
    - name: argocd-token-secret-key
      type: string
      default: token
      description: Key inside the Argo CD token secret.
  workspaces:
    - name: shared-workspace
  tasks:
    - name: clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: namespace
            value: openshift-pipelines
          - name: name
            value: git-clone
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DELETE_EXISTING
          value: "true"
      workspaces:
        - name: output
          workspace: shared-workspace
    - name: install-dependencies
      runAfter:
        - clone
      taskRef:
        name: npm-ci
      params:
        - name: app-subdir
          value: $(params.app-subdir)
      workspaces:
        - name: source
          workspace: shared-workspace
    - name: dependency-audit
      runAfter:
        - install-dependencies
      taskRef:
        name: npm-audit
      params:
        - name: app-subdir
          value: $(params.app-subdir)
        - name: audit-level
          value: $(params.audit-level)
      workspaces:
        - name: source
          workspace: shared-workspace
    - name: dockerfile-lint
      runAfter:
        - clone
      taskRef:
        name: dockerfile-lint
      params:
        - name: app-subdir
          value: $(params.app-subdir)
      workspaces:
        - name: source
          workspace: shared-workspace
    - name: frontend-build
      runAfter:
        - install-dependencies
      taskRef:
        name: frontend-build
      params:
        - name: app-subdir
          value: $(params.app-subdir)
      workspaces:
        - name: source
          workspace: shared-workspace
    - name: argocd-sync
      runAfter:
        - update-helm-image
      taskRef:
        name: argocd-sync
      params:
        - name: argocd-server
          value: $(params.argocd-server)
        - name: argocd-application
          value: $(params.argocd-application)
        - name: argocd-revision
          value: $(tasks.update-helm-image.results.commit)
        - name: argocd-insecure
          value: $(params.argocd-insecure)
        - name: argocd-grpc-web
          value: $(params.argocd-grpc-web)
        - name: argocd-sync-timeout
          value: $(params.argocd-sync-timeout)
        - name: argocd-token-secret-name
          value: $(params.argocd-token-secret-name)
        - name: argocd-token-secret-key
          value: $(params.argocd-token-secret-key)
    - name: sonarqube-scan
      runAfter:
        - frontend-build
      when:
        - input: $(params.enable-sonarqube)
          operator: in
          values:
            - "true"
      taskRef:
        name: sonarqube-scan
      params:
        - name: app-subdir
          value: $(params.app-subdir)
        - name: sonar-host-url
          value: $(params.sonar-host-url)
        - name: sonar-project-key
          value: $(params.sonar-project-key)
        - name: sonar-token-secret-name
          value: $(params.sonar-token-secret-name)
        - name: sonar-token-secret-key
          value: $(params.sonar-token-secret-key)
      workspaces:
        - name: source
          workspace: shared-workspace
    - name: build-image
      runAfter:
        - dependency-audit
        - dockerfile-lint
        - frontend-build
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: namespace
            value: openshift-pipelines
          - name: name
            value: buildah
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/$(params.image-namespace)/$(params.image-name):$(tasks.clone.results.COMMIT)
        - name: DOCKERFILE
          value: $(params.app-subdir)/Dockerfile
        - name: CONTEXT
          value: $(params.app-subdir)
        - name: TLS_VERIFY
          value: "false"
      workspaces:
        - name: source
          workspace: shared-workspace
    - name: update-helm-image
      runAfter:
        - build-image
      taskRef:
        name: update-helm-image
      params:
        - name: git-url
          value: $(params.git-url)
        - name: git-revision
          value: $(params.git-revision)
        - name: app-subdir
          value: $(params.app-subdir)
        - name: values-file
          value: $(params.helm-values-file)
        - name: image-repository
          value: image-registry.openshift-image-registry.svc:5000/$(params.image-namespace)/$(params.image-name)
        - name: image-tag
          value: $(tasks.clone.results.COMMIT)
        - name: git-user-name
          value: $(params.git-user-name)
        - name: git-user-email
          value: $(params.git-user-email)
        - name: git-credentials-secret-name
          value: $(params.git-credentials-secret-name)
        - name: git-username-secret-key
          value: $(params.git-username-secret-key)
        - name: git-token-secret-key
          value: $(params.git-token-secret-key)
      workspaces:
        - name: source
          workspace: shared-workspace
