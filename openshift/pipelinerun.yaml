apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: debitos-tributarios-deploy-
  namespace: debitos-tributarios
spec:
  pipelineRef:
    name: debitos-tributarios-deploy
  taskRunTemplate:
    serviceAccountName: pipeline
  params:
    - name: git-url
      value: https://example.com/your-org/your-repo.git
    - name: git-revision
      value: main
    - name: app-subdir
      value: debitos-tributarios
    - name: deploy-namespace
      value: debitos-tributarios
    - name: image-name
      value: debitos-tributarios
    - name: release-name
      value: debitos-tributarios
    - name: route-host
      value: ""
    - name: audit-level
      value: high
    - name: enable-sonarqube
      value: "false"
    - name: sonar-host-url
      value: ""
    - name: sonar-project-key
      value: debitos-tributarios
    - name: sonar-token-secret-name
      value: sonarqube-token
    - name: sonar-token-secret-key
      value: token
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
