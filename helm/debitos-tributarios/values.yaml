replicaCount: 1

image:
  repository: image-registry.openshift-image-registry.svc:5000/debitos-tributarios/debitos-tributarios
  tag: "36d8c9bb46fc84e35d048ffeb2c0748ad2412ebd"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: debitos.local
      paths:
        - path: /
      pathType: Prefix
  tls: []

route:
  enabled: true
  host: ""
  path: /
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
